name: Compass CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  analyze_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code/schemas
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run static analysis
        run: flutter analyze

      - name: Run unit and widget tests
        run: flutter test

  build_apk:
    needs: analyze_and_test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code/schemas
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build debug APK
        run: |
          flutter build apk --debug --build-name=1.0.${{ github.run_number }} --build-number=${{ github.run_number }}
          mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/compass-debug-${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: compass-debug-apk
          path: build/app/outputs/flutter-apk/compass-debug-*.apk
          retention-days: 7
